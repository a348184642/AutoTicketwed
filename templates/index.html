<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的Python仓库网页工具</title>
    <!-- 引入Bootstrap（无需下载，直接用CDN） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css"> <!-- 自定义样式（可选） -->
</head>
<body>
    <div class="container mt-5">
        <h2>Python仓库功能网页版</h2>
        <!-- 输入区域 -->
        <div class="mb-3">
            <label class="form-label">输入参数</label>
            <textarea class="form-control" id="inputText" rows="3"></textarea>
        </div>
        <!-- 执行按钮 -->
        <button class="btn btn-primary" onclick="runFunction()">执行功能</button>
        <!-- 结果展示区 -->
        <div class="mt-3">
            <h4>执行结果：</h4>
            <div id="resultArea" class="border p-3"></div>
        </div>
    </div>

    <!-- JS逻辑：调用后端接口 -->
    <script>
        function runFunction() {
            // 获取输入内容
            const inputText = document.getElementById('inputText').value;
            // 调用后端接口
            fetch('/run_function', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `input_text=${encodeURIComponent(inputText)}`
            })
            .then(response => response.json())
            .then(data => {
                // 展示结果
                const resultArea = document.getElementById('resultArea');
                if (data.status === 'success') {
                    resultArea.innerHTML = `<span style="color: green;">${data.result}</span>`;
                } else {
                    resultArea.innerHTML = `<span style="color: red;">错误：${data.msg}</span>`;
                }
            })
            .catch(error => {
                document.getElementById('resultArea').innerHTML = `<span style="color: red;">网络错误：${error}</span>`;
            });
        }
    </script>
</body>
</html>
